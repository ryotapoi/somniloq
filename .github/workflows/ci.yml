name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted="$(find . -name '*.go' -type f -print0 | xargs -0 gofmt -l)"
          test -z "$unformatted" || { echo "$unformatted"; exit 1; }

      - name: Run tests
        run: go test -count=1 ./...

      - name: Run vet
        run: go vet ./...

      - name: Build CLI
        run: go build -o bin/somniloq ./cmd/somniloq

  markdown:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install mdhop
        run: go install github.com/ryotapoi/mdhop/cmd/mdhop@v0.16.1

      - name: Build Markdown index
        run: mdhop build --vault llm-wiki

      - name: Diagnose Markdown links
        run: mdhop diagnose --vault llm-wiki --fields basename_conflicts,asset_basename_conflicts,phantoms,anchors --format json
